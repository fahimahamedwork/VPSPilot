# ─── VPSPilot Docker Compose ─────────────────────────────────
# Quick deployment with Docker Compose

services:
  vpspilot:
    build: .
    container_name: vpspilot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount host filesystem for full VPS access
      - /:/host:ro
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount for systemd interaction
      - /run/systemd:/run/systemd:ro
      # Persist bot data
      - vpspilot_data:/app/data
    # Required for systemd and network access
    network_mode: host
    # Privileged mode for full system access
    privileged: true
    # Alternative to privileged: specify capabilities
    # cap_add:
    #   - NET_ADMIN
    #   - SYS_ADMIN
    #   - SYS_PTRACE
    pid: host

volumes:
  vpspilot_data:
